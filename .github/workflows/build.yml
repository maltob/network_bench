name: Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev pkg-config

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build --release

    - name: Run checks
      run: cargo check --release

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: network_bench-${{ matrix.os }}
        path: |
          target/release/metrics-server*
          target/release/latency-tool*
          target/release/path-tool*
          target/release/transfer-tool*
          target/release/multicast-tool*
          target/release/sip-tool*
          target/release/udp-bench*
          target/release/tcp-bench*
          target/release/qos-tool*
          target/release/cps-bench*
          target/release/dns-bench*
          target/release/pmtu-tool*
          target/release/mtu-discovery*
          target/release/rrul-bench*
          !target/release/*.d
          !target/release/*.rlib
          !target/release/*.pdb
        if-no-files-found: warn
